<!--
  SentinelAI — Shared Agent Configuration
  Location on VM1: /var/ossec/etc/shared/default/agent.conf

  This configuration is pushed to all connected Wazuh agents. It instructs
  the Windows agent (VM3) to collect and forward four event channels that
  provide the telemetry needed for endpoint threat detection.
-->

<agent_config>

  <!-- Sysmon: process creation, network connections, file events, etc.
       This is the primary telemetry source for behavioral detection. -->
  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Windows Security: logon events, privilege use, account changes -->
  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Windows System: service installs, driver loads, system events -->
  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- PowerShell: script block logging, module logging, command execution -->
  <localfile>
    <location>Microsoft-Windows-PowerShell/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

</agent_config>
